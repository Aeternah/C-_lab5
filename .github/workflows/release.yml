name: C++ CI

on:
  push:
    branches:
      - main
      - feature/github_actions

jobs:
  build_ubuntu:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsfml-dev \
            cmake \
            build-essential \
            libudev-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Configure CMake
        run: |
          cmake -S. -B build -DPATCH_VERSION=${{ github.run_number }}

      - name: Build Project
        run: cmake --build build

      - name: Package Project
        run: |
          cmake --build build --target package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: physics-ubuntu-${{ github.run_number }}
          path: |
            build/*.deb
            build/*.tar.gz
            build/*.tar.xz

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }} (Ubuntu)
          draft: false
          prerelease: false
          files: |
            build/*.deb
            build/*.tar.gz
            build/*.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    runs-on: windows-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-sfml

      - name: Configure CMake (Windows)
        shell: msys2 {0}
        run: |
          cmake -S. -B build -G "MinGW Makefiles" -DPATCH_VERSION=${{ github.run_number }}

      - name: Build Project (Windows)
        shell: msys2 {0}
        run: |
          cmake --build build

      - name: Package Project (Windows)
        shell: msys2 {0}
        run: |
          cmake --build build --target package

      - name: Upload Artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: physics-windows-${{ github.run_number }}
          path: |
            build/*.zip
            build/*.exe

      - name: Create Release (Windows)
        id: create_release_windows
        uses: softprops/action-gh-release@v1
        with:
          tag_name: windows-v${{ github.run_number }}
          name: Release ${{ github.run_number }} (Windows)
          draft: false
          prerelease: false
          files: |
            build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}